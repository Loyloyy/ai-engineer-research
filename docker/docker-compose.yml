# The researcher app. NO litellm proxy (roles bind their own endpoint via build_chat_model).
#
# Shared services (search + tracing) live in the separate `service-depot` repo and are reached over the
# external `depot-net` network — bring them up FIRST: `./depot up stage-2` there. Then:
#   docker compose run --rm app python scripts/m0_toolcall_probe.py   # M0 validation
#
# Host-specific bits (mounting private model paths, GPU reservations, the served-model
# endpoint if not host.docker.internal) go in docker-compose.override.yml (gitignored) —
# see docker-compose.override.yml.example.
#
# `version:` (not `name:`) — the server runs docker-compose v1, which requires it.

version: "3.8"

services:
  # ---- The researcher app (run via `docker compose run`, not auto-started) ----
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ai-engineer-research-app
    container_name: aer-app
    profiles: ["app"]
    env_file:
      - ../.env
    environment:
      # inside the compose network, reach services by NAME (not localhost)
      - SEARX_URL=http://searxng:8080
    extra_hosts:
      # lets the app reach a vLLM server running on the host (Linux/WSL/Mac)
      - "host.docker.internal:host-gateway"
    volumes:
      - ../config:/app/config          # edit pipeline.yaml without rebuilding
      - ../src:/app/src                # mount source so code changes need no image rebuild
      - ../scripts:/app/scripts
      # --- Output mounts. On the NFS share, PRE-CREATE these dirs first (Docker runs as root and
      #     root-squash blocks mkdir): `mkdir -p ../artifacts && chmod 777 ../artifacts`
      - ../artifacts:/app/artifacts      # M1 Slice 2: persisted research run folders
      # - ../vault_data:/app/vault_data  # later: duplicated READ-ONLY wiki seed
      # - hf-cache:/app/.hf_cache        # M2: embedding/reranker weights, cached across runs
    networks:
      # Shared services (searxng + langfuse-web) live in the `service-depot` repo on this external
      # network. Bring them up first (`./depot up stage-2`); SEARX_URL / LANGFUSE_HOST resolve by name.
      - depot-net

  # ---- The web UI (long-running FastAPI + built React SPA). Reach via SSH tunnel like Langfuse. ----
  # `docker compose --profile web up --build web` ; then tunnel localhost:8000 -> server:8000.
  # PRESENTATION/CONTROL ONLY — it wraps run_research over HTTP + streams live events (rule #3).
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    image: ai-engineer-research-web
    container_name: aer-web
    profiles: ["web"]
    env_file:
      - ../.env
    environment:
      - SEARX_URL=http://searxng:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      # Edit pipeline.yaml + prompt overrides live (the UI writes config/prompts/ + pipeline.yaml).
      - ../config:/app/config
      - ../src:/app/src                 # code changes need no image rebuild (SPA dist stays baked)
      - ../artifacts:/app/artifacts     # same run folders the CLI writes — history reads these
    networks:
      - depot-net

networks:
  depot-net:
    external: true

