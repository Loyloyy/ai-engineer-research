# Core stack. NO litellm proxy (roles bind their own endpoint via build_chat_model).
#
#   docker compose up -d searxng                         # start search (M1+)
#   docker compose run --rm app python scripts/m0_toolcall_probe.py   # M0 validation
#
# Host-specific bits (mounting private model paths, GPU reservations, the served-model
# endpoint if not host.docker.internal) go in docker-compose.override.yml (gitignored) —
# see docker-compose.override.yml.example.
#
# `version:` (not `name:`) — the server runs docker-compose v1, which requires it.

version: "3.8"

services:
  searxng:
    image: searxng/searxng:latest
    container_name: aer-searxng
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
    restart: unless-stopped

  # ---- The researcher app (run via `docker compose run`, not auto-started) ----
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ai-engineer-research-app
    container_name: aer-app
    profiles: ["app"]
    env_file:
      - ../.env
    environment:
      # inside the compose network, reach services by NAME (not localhost)
      - SEARX_URL=http://searxng:8080
    extra_hosts:
      # lets the app reach a vLLM server running on the host (Linux/WSL/Mac)
      - "host.docker.internal:host-gateway"
    volumes:
      - ../config:/app/config          # edit pipeline.yaml without rebuilding
      - ../src:/app/src                # mount source so code changes need no image rebuild
      - ../scripts:/app/scripts
      # --- Output/cache mounts (enable per milestone). On the NFS share these dirs must be
      #     PRE-CREATED by the user first (Docker runs as root and root-squash blocks mkdir):
      #         mkdir -p ../artifacts ../vault_data && chmod 777 ../artifacts ../vault_data
      # - ../vault_data:/app/vault_data  # M1: duplicated READ-ONLY wiki seed
      # - ../artifacts:/app/artifacts    # M2: persisted research run folders
      # - hf-cache:/app/.hf_cache        # M2: embedding/reranker weights, cached across runs

